<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">聊天室服务端控制台</title>
    <style>
        body { margin: 0; font-family: "Segoe UI", "Microsoft YaHei", sans-serif; background: #0c1228; color: #ecf1ff; }
        .wrap { width: min(1100px, 96vw); margin: 20px auto; }
        .panel { background: #151d3f; border: 1px solid #2b376f; border-radius: 12px; padding: 16px; margin-bottom: 14px; }
        input { background: #0e1533; color: #fff; border: 1px solid #33448a; border-radius: 8px; padding: 8px; }
        button { border: none; color: #fff; border-radius: 8px; padding: 8px 12px; cursor: pointer; margin-right: 8px; }
        .start { background: #2f86ff; }
        .stop { background: #ff617d; }
        .metrics { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 10px; }
        .metric { background: #0f1738; border: 1px solid #2f3f85; border-radius: 10px; padding: 10px; }
        .metric-title { color: #9db2f0; font-size: 12px; }
        .metric-value { font-size: 24px; font-weight: 700; }
        .users { margin-top: 10px; max-height: 200px; overflow: auto; background: #0c1330; border: 1px solid #2f3f85; border-radius: 10px; padding: 10px; }
        .user { font-family: Consolas, monospace; font-size: 12px; padding: 4px 0; border-bottom: 1px dashed #27356e; }
        .logs { height: 520px; overflow: auto; background: #0c1330; border: 1px solid #2f3f85; border-radius: 10px; padding: 10px; }
        .log { font-family: Consolas, monospace; font-size: 12px; padding: 3px 0; border-bottom: 1px dashed #27356e; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="panel">
        <h2 th:text="${title}" style="margin-top:0;">聊天室服务端控制台</h2>
        <a href="/" target="_blank" rel="noopener noreferrer" style="color:#84b5ff;">返回监控主页</a>
        <div style="margin-top:10px;">
            <label>端口：<input id="port" type="number" value="9000"></label>
            <button class="start" onclick="startServer()">启动服务端</button>
            <button class="stop" onclick="stopServer()">停止服务端</button>
            <span id="status" style="margin-left:8px;color:#96d7a9;">状态未知</span>
        </div>
        <div class="metrics">
            <div class="metric"><div class="metric-title">在线用户</div><div id="onlineUsers" class="metric-value">0</div></div>
            <div class="metric"><div class="metric-title">累计连接</div><div id="totalConnections" class="metric-value">0</div></div>
        </div>
    </div>

    <div class="panel">
        <h3 style="margin-top:0;">在线用户列表</h3>
        <div id="onlineUserList" class="users"></div>
    </div>

    <div class="panel">
        <h3 style="margin-top:0;">服务端实时日志</h3>
        <div id="logs" class="logs"></div>
    </div>
</div>
<script>
    function render(data) {
        const status = document.getElementById("status");
        status.innerText = data.running ? `运行中 PID=${data.pid}` : "未运行";
        status.style.color = data.running ? "#4fdf9f" : "#ff8b9f";

        document.getElementById("onlineUsers").innerText = data.onlineUsers ?? 0;
        document.getElementById("totalConnections").innerText = data.totalConnections ?? 0;

        const onlineUserList = data.onlineUserList || [];
        document.getElementById("onlineUserList").innerHTML = onlineUserList.length
            ? onlineUserList.map(v => `<div class="user">#${v.id} ${v.name}</div>`).join("")
            : `<div class="user">暂无在线用户</div>`;

        document.getElementById("logs").innerHTML = (data.logs || []).map(v =>
            `<div class="log">[${new Date(v.time).toLocaleTimeString()}] [${v.source}] ${v.text}</div>`
        ).join("");
    }

    async function startServer() {
        await fetch("/api/runtime/server/start", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({port: Number(document.getElementById("port").value)})
        });
    }

    async function stopServer() {
        await fetch("/api/runtime/server/stop", {method: "POST"});
    }

    const es = new EventSource("/api/runtime/stream");
    es.addEventListener("server", e => render(JSON.parse(e.data)));
</script>
</body>
</html>

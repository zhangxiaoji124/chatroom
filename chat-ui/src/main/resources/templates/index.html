<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">聊天室压测可视化监控台</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
    <style>
        :root {
            --bg: #090d1f;
            --panel: #131a37;
            --panel-soft: #1a244b;
            --text: #f3f6ff;
            --sub: #a6b3e4;
            --line: rgba(255, 255, 255, 0.12);
            --accent: #56a8ff;
            --ok: #3ed49e;
            --warn: #ffcc66;
            --danger: #ff668b;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
            color: var(--text);
            background: radial-gradient(circle at 15% 0%, #21356e 0%, var(--bg) 52%);
        }
        .layout {
            width: min(1300px, 96vw);
            margin: 24px auto;
            display: grid;
            grid-template-columns: 1.35fr 1fr;
            gap: 16px;
        }
        .panel {
            background: linear-gradient(160deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 18px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
        }
        h1 { margin: 0; font-size: 28px; }
        .sub { margin-top: 8px; color: var(--sub); font-size: 14px; }
        .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .status { font-size: 13px; padding: 6px 12px; border-radius: 999px; border: 1px solid var(--line); }
        .status.running { color: var(--ok); border-color: rgba(62,212,158,0.65); background: rgba(62,212,158,0.15); }
        .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .metric-card { background: var(--panel-soft); border: 1px solid var(--line); border-radius: 12px; padding: 12px; }
        .metric-title { color: var(--sub); font-size: 12px; margin-bottom: 6px; }
        .metric-value { font-size: 24px; font-weight: 700; }
        .controls { margin-top: 14px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .controls input { width: 100%; background: #0c1330; border: 1px solid var(--line); border-radius: 8px; color: var(--text); padding: 8px; }
        .buttons { margin-top: 10px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        button { border: none; border-radius: 9px; padding: 9px 14px; color: #fff; cursor: pointer; }
        .start { background: linear-gradient(135deg, #1e9bff, #3878ff); }
        .stop { background: linear-gradient(135deg, #ff7a7a, #f04f6f); }
        .event-btn { background: linear-gradient(135deg, #8f7cff, #5f63ff); }
        #chart { margin-top: 14px; height: 340px; width: 100%; }
        .events { height: 650px; overflow: auto; border: 1px solid var(--line); border-radius: 12px; background: rgba(11, 17, 40, 0.65); padding: 10px; }
        .event { border-bottom: 1px solid rgba(255,255,255,0.08); padding: 10px 4px; font-size: 13px; }
        .event:last-child { border-bottom: none; }
        .event .time { color: var(--sub); font-family: Consolas, monospace; }
        .event .type { font-weight: 600; margin-left: 8px; }
        .event.SEND .type, .event.RECEIVE .type { color: var(--ok); }
        .event.SEND_FAIL .type, .event.FAIL .type { color: var(--danger); }
        .event.SYSTEM .type, .event.START .type, .event.STOP .type { color: var(--warn); }
        @media (max-width: 980px) {
            .layout { grid-template-columns: 1fr; }
            .metrics { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="layout">
    <section class="panel">
        <div class="top">
            <div>
                <h1 th:text="${title}">聊天室压测可视化监控台</h1>
                <div class="sub">实时监控聊天收发量、连接数、吞吐及异常，支持一键启动压测。</div>
            </div>
            <div id="statusTag" class="status">空闲中</div>
        </div>

        <div class="metrics">
            <div class="metric-card"><div class="metric-title">发送总数</div><div class="metric-value" id="sent">0</div></div>
            <div class="metric-card"><div class="metric-title">接收总数</div><div class="metric-value" id="received">0</div></div>
            <div class="metric-card"><div class="metric-title">失败总数</div><div class="metric-value" id="failed">0</div></div>
            <div class="metric-card"><div class="metric-title">在线用户</div><div class="metric-value" id="users">0</div></div>
            <div class="metric-card"><div class="metric-title">活跃连接</div><div class="metric-value" id="connections">0</div></div>
            <div class="metric-card"><div class="metric-title">吞吐(msg/s)</div><div class="metric-value" id="throughput">0</div></div>
        </div>

        <div class="controls">
            <label>虚拟用户数<input id="virtualUsers" type="number" min="1" value="80"></label>
            <label>消息速率/s <input id="msgRate" type="number" min="1" value="160"></label>
            <label>时长(秒) <input id="duration" type="number" min="5" value="60"></label>
        </div>
        <div class="buttons">
            <button class="start" onclick="startLoadTest()">启动压测</button>
            <button class="stop" onclick="stopLoadTest()">停止压测</button>
            <button class="event-btn" onclick="mockExternalEvent()">模拟外部事件</button>
            <a href="/server" target="_blank" rel="noopener noreferrer" style="margin-left:10px;color:#9fc2ff;">进入服务端页面</a>
            <a href="/client" target="_blank" rel="noopener noreferrer" style="margin-left:10px;color:#9fc2ff;">进入客户端页面</a>
        </div>

        <div id="chart"></div>
    </section>

    <section class="panel">
        <h2 style="margin-top:0;">实时事件流</h2>
        <div class="sub" style="margin-bottom:10px;">可用于观察聊天消息发送、接收与失败波动。</div>
        <div id="events" class="events"></div>
    </section>
</div>

<script>
    const chart = echarts.init(document.getElementById("chart"));
    chart.setOption({
        backgroundColor: "transparent",
        tooltip: { trigger: "axis" },
        legend: { data: ["发送", "接收", "失败"], textStyle: { color: "#d5deff" } },
        grid: { left: 40, right: 20, top: 40, bottom: 30 },
        xAxis: { type: "category", data: [], axisLine: { lineStyle: { color: "#6f7ab0" } } },
        yAxis: { type: "value", axisLine: { lineStyle: { color: "#6f7ab0" } }, splitLine: { lineStyle: { color: "rgba(255,255,255,.08)" } } },
        series: [
            { name: "发送", type: "line", smooth: true, data: [], lineStyle: { color: "#5bb0ff" }, showSymbol: false },
            { name: "接收", type: "line", smooth: true, data: [], lineStyle: { color: "#36d39a" }, showSymbol: false },
            { name: "失败", type: "line", smooth: true, data: [], lineStyle: { color: "#ff6f96" }, showSymbol: false }
        ]
    });

    function setText(id, value) {
        document.getElementById(id).innerText = value;
    }

    function render(snapshot) {
        setText("sent", snapshot.sent);
        setText("received", snapshot.received);
        setText("failed", snapshot.failed);
        setText("users", snapshot.onlineUsers);
        setText("connections", snapshot.activeConnections);
        setText("throughput", snapshot.throughput);

        const statusTag = document.getElementById("statusTag");
        if (snapshot.running) {
            statusTag.innerText = "压测运行中";
            statusTag.classList.add("running");
        } else {
            statusTag.innerText = "空闲中";
            statusTag.classList.remove("running");
        }

        const timeline = snapshot.timeline || [];
        const x = timeline.map(v => new Date(v.timestamp).toLocaleTimeString());
        chart.setOption({
            xAxis: { data: x },
            series: [
                { data: timeline.map(v => v.sent) },
                { data: timeline.map(v => v.received) },
                { data: timeline.map(v => v.failed) }
            ]
        });

        const eventsBox = document.getElementById("events");
        const events = snapshot.recentEvents || [];
        eventsBox.innerHTML = events.slice(0, 80).map(e =>
            `<div class="event ${e.type}"><span class="time">${new Date(e.time).toLocaleTimeString()}</span><span class="type">${e.type}</span><div>${e.actor} - ${e.detail}</div></div>`
        ).join("");
    }

    async function startLoadTest() {
        await fetch("/api/loadtest/start", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                virtualUsers: Number(document.getElementById("virtualUsers").value),
                msgRatePerSecond: Number(document.getElementById("msgRate").value),
                durationSeconds: Number(document.getElementById("duration").value)
            })
        });
    }

    async function stopLoadTest() {
        await fetch("/api/loadtest/stop", { method: "POST" });
    }

    async function mockExternalEvent() {
        const dirs = ["SEND", "RECEIVE", "FAIL"];
        const direction = dirs[Math.floor(Math.random() * dirs.length)];
        await fetch("/api/chat/event", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ direction, message: "来自C++侧的模拟上报事件" })
        });
    }

    const es = new EventSource("/api/stream");
    es.addEventListener("metrics", (event) => {
        render(JSON.parse(event.data));
    });
    es.onerror = () => console.warn("SSE disconnected");

    window.addEventListener("resize", () => chart.resize());
</script>
</body>
</html>
